<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IRAA AI</title>

  <!-- Main Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

  <!-- App Root -->
  <div id="app">
<!-- =========================
     IRAA TOP BAR
========================= -->

<header class="top-bar">

  <div class="brand">
<img src="IMG-20260708-WA0000.jpg" class="logo" alt="IRAA AI Logo">

    <div class="brand-name">
      IRAA
    </div>

  </div>

  <div class="top-actions">

    <div class="coin free">
      🪙 <span>120</span>
    </div>

    <div class="coin premium">
      💎 <span>850</span>
    </div>

    <div class="notification">
      🔔
      <span class="dot"></span>
    </div>

  </div>

</header>
    <section class="welcome">

  <h1>Welcome to IRAA AI</h1>

  <p>Create Music, Videos, Images and more with AI.</p>

    </section> 
    <section class="search-box">

  <div class="search-container">

    <span class="material-icons">search</span>

    <input
      type="text"
      placeholder="Search Music, Videos, Images..."
    >

    <span class="material-icons">photo_camera</span>

    <span class="material-icons">mic</span>

    <img src="IMG-20260708-WA0000.jpg"
         class="assistant-icon"
         alt="IRAA Assistant">

  </div>
    </section>
  </div>

  <!-- Main Script -->
  <script src="script.js"></script>

</body>
</html>
