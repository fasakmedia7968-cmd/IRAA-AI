<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IRAA AI</title>

  <!-- Main Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- App Root -->
  <div id="app">
<!-- =========================
     IRAA AI Top Bar
========================= -->

<header class="top-bar">

    <!-- Left : IRAA Logo -->
    <div class="brand">
        <img src="1000080618.png"
             alt="IRAA AI"
             class="logo">
    </div>

    <!-- Right : Actions -->
    <div class="top-actions">

        <!-- Rewards -->
        <button class="action-btn reward-btn" aria-label="Rewards">
            <span class="material-icons">redeem</span>
        </button>

        <!-- Coins -->
        <button class="action-btn wallet-btn" aria-label="Coins">
            <span class="material-icons">diamond</span>
            <span class="coins">120</span>
        </button>

        <!-- Notification -->
        <button class="action-btn notify-btn" aria-label="Notifications">
            <span class="material-icons">notifications</span>
            <span class="notify-dot"></span>
        </button>

    </div>

</header>

<!-- =========================
     IRAA Search Bar
========================= -->

<section class="search-section">

    <div class="search-container">

        <!-- Left Search -->
        <button class="search-icon-btn" aria-label="Search">
            <span class="material-icons">search</span>
        </button>

        <!-- Search Input -->
        <input
            class="search-input"
            type="text"
            placeholder="Search anything..." />

        <!-- Right Side -->
        <div class="search-right">

            <!-- Image -->
            <button class="glass-icon image-btn" aria-label="Image">
                <span class="material-icons">image</span>
            </button>

            <!-- Mic -->
            <button class="glass-icon mic-btn" aria-label="Voice">
                <span class="material-icons">mic</span>
            </button>

            <!-- IRAA AI -->
            <button class="glass-icon ai-btn" aria-label="IRAA AI">

                <img
                    src="assets/iraa-logo.png"
                    class="search-assistant-icon"
                    alt="IRAA AI">

            </button>

        </div>

    </div>

    </section>

  <section class="iraa-premium-card">

  <div class="iraa-premium-glass">

    <div class="iraa-premium-left">
      <span class="crown">👑</span>
    </div>

    <div class="iraa-premium-center">

      <h2>IRAA Premium</h2>

      <p>
        Unlimited Creativity • HD Audio • No Ads
      </p>

      <button class="iraa-upgrade-btn">
        Upgrade
      </button>

    </div>

  <div class="iraa-premium-right">
    
 <span class="star star1">✦</span>
<span class="star star2">✦</span>
<span class="star star3">✦</span>
<span class="star star4">✦</span>
<span class="star star5">✦</span>
<span class="star star6">✦</span>

<span class="diamond">💎</span>

    </div>

  </div>


    </section>
    <div class="creator-menu">

  <div class="creator-item">
    <span class="material-icons">image</span>
    <small>Image</small>
  </div>

  <div class="creator-item">
    <span class="material-icons">audiotrack</span>
    <small>Audio</small>
  </div>

  <div class="creator-item">
    <span class="material-icons">videocam</span>
    <small>Video</small>
  </div>

    </div>
    <nav class="bottom-nav">

  <div class="nav-item active">
    <span class="material-icons">home</span>
    <small>Home</small>
  </div>

  <div class="nav-item">
    <span class="material-icons">trending_up</span>
    <small>Trending</small>
  </div>

  <div class="nav-item creator">
    <span class="material-icons">add</span>
  </div>

  <div class="nav-item">
    <span class="material-icons">video_library</span>
    <small>Library</small>
  </div>

  <div class="nav-item">
    <span class="material-icons">person</span>
    <small>Profile</small>
  </div>

    </nav>
  </div>

  <!-- Main Script -->
  <script src="script.js"></script>

</body>
</html>
