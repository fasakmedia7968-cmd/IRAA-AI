<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRAA AI</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <div id="app">
    <header class="top-bar">
      <div class="brand">
        <img src="1000080618.png" class="logo" alt="IRAA">
        <span class="brand-name">IRAA</span>
      </div>
      <div class="top-actions">
        <div class="reward">🎁 50</div>
        <div class="wallet">🪙 120</div>
      </div>
    </header>

    <section class="search-section">
      <div class="search-box">
        <img src="search_3d.png" class="icon-3d">
        <input type="text" placeholder="Search...">
      </div>
    </section>

    <section class="iraa-premium">
      <div class="premium-card">
        <h2>IRAA Premium</h2>
        <button class="upgrade-btn">Upgrade Now</button>
      </div>
    </section>

    <section class="tools-section">
      <div class="tools-header">
        <h2>AI Tools</h2>
        <span>View all</span>
      </div>
      <div class="tools-grid">
        <div class="tool-card"><img src="music_3d.png"><span>Music</span></div>
        <div class="tool-card"><img src="lyrics_3d.png"><span>Lyrics</span></div>
        <div class="tool-card"><img src="voice_3d.png"><span>Voice</span></div>
        <div class="tool-card"><img src="sing_3d.png"><span>Sing</span></div>
        <div class="tool-card"><img src="video_3d.png"><span>Video</span></div>
        <div class="tool-card"><img src="image_3d.png"><span>Image</span></div>
      </div>
    </section>
  </div>

  <div id="creator-modal" class="modal">
    <div class="modal-content">
      <div class="options-grid">
        <div class="option-card"><img src="image_3d.png"><span>Image</span></div>
        <div class="option-card"><img src="audio_3d.png"><span>Audio</span></div>
        <div class="option-card"><img src="video_3d.png"><span>Video</span></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="#" class="nav-item active"><span class="material-icons">home</span><span>Home</span></a>
    <a href="#" class="nav-item"><span class="material-icons">trending_up</span><span>Trending</span></a>
    <a href="#" class="nav-item" id="creator-btn"><span class="material-icons">add_circle</span><span>Creator</span></a>
    <a href="#" class="nav-item"><span class="material-icons">library_books</span><span>Library</span></a>
    <a href="#" class="nav-item"><span class="material-icons">person</span><span>Profile</span></a>
  </nav>

  <script>
    // Modal Logic
    const creatorBtn = document.getElementById('creator-btn');
    const modal = document.getElementById('creator-modal');
    creatorBtn.addEventListener('click', (e) => {
        e.preventDefault();
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    });
  </script>
</body>
</html>
